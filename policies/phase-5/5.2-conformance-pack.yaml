# Phase 5.2 — sample AWS Config conformance pack.
#
# A conformance pack is a collection of AWS Config rules (and optional remediation)
# packaged as a single deployable unit, backed by CloudFormation. Deploy it with
# put_conformance_pack (single account) or put_organization_conformance_pack
# (org-wide). The whole pack is tracked as ONE aggregate compliance score -- the
# governance advantage over attaching these rules one at a time.
#
# This is a deliberately small starter (5 managed rules spanning several domains).
# Real packs (e.g. "Operational Best Practices for CIS AWS Foundations Benchmark")
# bundle dozens; browse the AWS sample templates and swap them in.
#
# Used by scripts/phase-5/setup_config_aggregator.py --conformance-pack.

Resources:

  S3PublicReadProhibited:
    Type: AWS::Config::ConfigRule
    Properties:
      ConfigRuleName: cpack-s3-bucket-public-read-prohibited
      Source:
        Owner: AWS
        SourceIdentifier: S3_BUCKET_PUBLIC_READ_PROHIBITED
      Scope:
        ComplianceResourceTypes:
          - AWS::S3::Bucket

  S3SSLRequestsOnly:
    Type: AWS::Config::ConfigRule
    Properties:
      ConfigRuleName: cpack-s3-bucket-ssl-requests-only
      Source:
        Owner: AWS
        SourceIdentifier: S3_BUCKET_SSL_REQUESTS_ONLY
      Scope:
        ComplianceResourceTypes:
          - AWS::S3::Bucket

  EncryptedVolumes:
    Type: AWS::Config::ConfigRule
    Properties:
      ConfigRuleName: cpack-encrypted-volumes
      Source:
        Owner: AWS
        SourceIdentifier: ENCRYPTED_VOLUMES
      Scope:
        ComplianceResourceTypes:
          - AWS::EC2::Volume

  IAMPasswordPolicy:
    Type: AWS::Config::ConfigRule
    Properties:
      ConfigRuleName: cpack-iam-password-policy
      Source:
        Owner: AWS
        SourceIdentifier: IAM_PASSWORD_POLICY

  CloudTrailEnabled:
    Type: AWS::Config::ConfigRule
    Properties:
      ConfigRuleName: cpack-cloudtrail-enabled
      Source:
        Owner: AWS
        SourceIdentifier: CLOUD_TRAIL_ENABLED
